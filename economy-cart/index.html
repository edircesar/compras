<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Economia Inteligente — Controle de Gastos Offline</title>
  
  <!-- Configurações PWA e Mobile-First -->
  <meta name="theme-color" content="#1B4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="App mobile-first de lista de compras com controle de gastos em tempo real offline. PWA Economia Inteligente.">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  
  <!-- CSS Global -->
  <link rel="stylesheet" href="css/app.css">
  
  <!-- Biblioteca IndexedDB idb (v8) via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>
  
  <!-- Biblioteca Chart.js para Gráficos Interativos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Biblioteca html2pdf.js para Exportação de Relatório PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <!-- Container de Mensagens Flutuantes (Toasts) -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Shell Dinâmico da SPA -->
  <main id="app">
    <!-- As páginas serão injetadas aqui pelo roteador js/app.js -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
      <h2 style="color: var(--color-primary);">Carregando Economia Inteligente...</h2>
    </div>
  </main>

  <!-- Barra de Navegação Inferior Móvel -->
  <nav id="bottom-nav" class="bottom-nav" style="display: none;">
    <a href="#historico" class="nav-item" id="nav-historico">
      <span class="nav-icon">🛍️</span>
      <span class="nav-label">Minhas Compras</span>
    </a>
    <a href="#estatisticas" class="nav-item" id="nav-estatisticas">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Estatísticas</span>
    </a>
    <a href="#sobre" class="nav-item" id="nav-sobre">
      <span class="nav-icon">ℹ️</span>
      <span class="nav-label">Sobre Nós</span>
    </a>
  </nav>

  <!-- Sistema de Toast Global -->
  <script>
    /**
     * Exibe um Toast Notification não bloqueante na tela.
     * @param {string} message Mensagem a ser exibida.
     * @param {string} type Tipo do toast: 'success', 'error', 'info'.
     */
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      if (!container) return;
      
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span>${message}</span>
        <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
      `;
      container.appendChild(toast);
      
      // Auto remover após 4 segundos
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        toast.style.transition = 'opacity 0.3s, transform 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }
  </script>

  <!-- Camada de Scripts do SPA (Ordem de Dependências) -->
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/compra.js"></script>
  <script src="js/historico.js"></script>
  <script src="js/estatisticas.js"></script>
  <script src="js/notificacoes.js"></script>
  <script src="js/app.js"></script>

  <!-- Registro de Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      // Variável para evitar múltiplos recarregamentos simultâneos
      let refreshing = false;

      // Escuta mudanças de controlador (indica que um novo Service Worker assumiu a página)
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          if (typeof showToast === 'function') {
            showToast('Nova versão instalada! Atualizando aplicativo...', 'info');
          }
          setTimeout(() => {
            window.location.reload();
          }, 1500);
        }
      });

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then((reg) => {
            console.log('[PWA] Service Worker registrado com sucesso! Escopo:', reg.scope);
            
            // Ativa Background Sync se suportado
            if (typeof SyncManager !== 'undefined') {
              SyncManager.registerBackgroundSync();
            }

            // Opcional: força uma verificação de atualização no carregamento
            reg.update();
          })
          .catch((err) => {
            console.error('[PWA] Falha ao registrar Service Worker:', err);
          });
      });
    }
  </script>
</body>
</html>
